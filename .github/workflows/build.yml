name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: ArtemSBulgakov/buildozer-action@v1
        with:
          command: buildozer android debug

      - uses: actions/upload-artifact@v3
        with:
          name: owleyes-apk
          path: bin/*.apk
